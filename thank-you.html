<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You – Evodia Lenong Luncheon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
--nude-deep: #c4a882;
--nude-mid: #d9c4a8;
--nude-light: #efe5d6;
--nude-pale: #f8f2ea;
--nude-cream: #fdf9f4;
--gold: #b8976a;
--dark: #4a3b2c;
--text: #5c4a35;
--soft: #8a7260;
}
html, body { min-height: 100%; }
body {
background: #e8ddd0;
display: flex;
align-items: center;
justify-content: center;
font-family: 'Jost', sans-serif;
background-image:
radial-gradient(ellipse at 20% 20%, rgba(196,168,130,0.18) 0%, transparent 60%),
radial-gradient(ellipse at 80% 80%, rgba(184,151,106,0.14) 0%, transparent 60%);
}
.card {
background: var(--nude-cream);
width: min(420px, 96vw);
min-height: 560px;
position: relative;
display: flex;
flex-direction: column;
align-items: center;
overflow: hidden;
box-shadow:
0 0 0 1px rgba(184,151,106,0.3),
0 4px 6px rgba(74,59,44,0.06),
0 20px 60px rgba(74,59,44,0.18),
0 60px 100px rgba(74,59,44,0.1);
animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes fadeUp {
from { opacity: 0; transform: translateY(24px); }
to   { opacity: 1; transform: translateY(0); }
}
.card::before {
content: '';
position: absolute;
inset: 8px;
border: 1px solid rgba(184,151,106,0.35);
pointer-events: none;
z-index: 10;
}
.card::after {
content: '';
position: absolute;
inset: 12px;
border: 1px solid rgba(184,151,106,0.18);
pointer-events: none;
z-index: 10;
}
.top-art {
width: 100%;
height: 110px;
flex-shrink: 0;
position: relative;
background: linear-gradient(165deg, var(--nude-light) 0%, var(--nude-pale) 60%, var(--nude-cream) 100%);
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
}
.content {
width: 100%;
padding: 32px 30px 28px;
display: flex;
flex-direction: column;
align-items: center;
gap: 20px;
}
.check-icon {
width: 56px; height: 56px;
border-radius: 50%;
background: linear-gradient(135deg, var(--nude-mid), var(--gold));
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
animation: slideIn 0.8s 0.3s ease forwards;
}
.check-icon svg { width: 28px; height: 28px; stroke: #fff; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
@keyframes slideIn {
from { opacity: 0; transform: translateY(6px); }
to   { opacity: 1; transform: translateY(0); }
}
.heading {
font-family: 'Cormorant Garamond', serif;
font-weight: 500;
font-size: 28px;
letter-spacing: 0.06em;
color: var(--text);
text-align: center;
opacity: 0;
animation: slideIn 0.8s 0.5s ease forwards;
}
.description {
font-family: 'Cormorant Garamond', serif;
font-style: italic;
font-weight: 300;
font-size: 13px;
color: var(--soft);
text-align: center;
line-height: 1.6;
opacity: 0;
animation: slideIn 0.8s 0.7s ease forwards;
}
.info-card {
width: 100%;
background: rgba(239,229,214,0.7);
border: 1px solid rgba(184,151,106,0.4);
border-radius: 16px;
padding: 20px;
display: grid;
gap: 16px;
opacity: 0;
animation: slideIn 0.8s 0.9s ease forwards;
}
.info-section { display: flex; flex-direction: column; gap: 6px; }
.info-label {
font-family: 'Jost', sans-serif;
font-weight: 200;
font-size: 8px;
letter-spacing: 0.3em;
text-transform: uppercase;
color: var(--gold);
}
.menu-link {
display: inline-flex;
align-items: center;
gap: 8px;
padding: 10px 18px;
background: linear-gradient(135deg, var(--nude-mid), var(--gold));
color: #fff;
text-decoration: none;
font-family: 'Jost', sans-serif;
font-weight: 500;
font-size: 13px;
letter-spacing: 0.04em;
border-radius: 999px;
box-shadow: 0 6px 14px rgba(74,59,44,0.12);
transition: transform 0.2s ease, box-shadow 0.2s ease;
align-self: flex-start;
}
.menu-link:hover { transform: translateY(-1px); box-shadow: 0 10px 18px rgba(74,59,44,0.16); }
.contact-item {
font-family: 'Cormorant Garamond', serif;
font-size: 15px;
color: var(--dark);
line-height: 1.5;
}
.contact-name { font-weight: 500; }
.contact-number { color: var(--soft); }
.change-note {
font-family: 'Cormorant Garamond', serif;
font-style: italic;
font-size: 12px;
color: var(--soft);
text-align: center;
line-height: 1.5;
opacity: 0;
animation: slideIn 0.8s 1.1s ease forwards;
}
.divider {
width: 80px; height: 1px;
background: linear-gradient(to right, transparent, var(--nude-deep), transparent);
opacity: 0;
animation: slideIn 0.8s 0.6s ease forwards;
}
</style>
</head>
<body>
<div class="card">
  <div class="top-art"></div>
  <div class="content">
    <div class="check-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 class="heading">Thank you!</h1>
    <p class="description">Your RSVP has been received. We look forward to celebrating with you.</p>
    <div class="divider"></div>
    <div class="info-card">
      <div class="info-section">
        <span class="info-label">Menu</span>
        <a class="menu-link" href="https://share.google/0qt2p3r1DAsGyf056" target="_blank">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          View Menu
        </a>
      </div>
      <div class="info-section">
        <span class="info-label">Need to change your RSVP?</span>
        <div class="contact-item">
          <span class="contact-name">Dipolelo</span> · <span class="contact-number">079 830 5778</span>
        </div>
        <div class="contact-item">
          <span class="contact-name">Thembi</span> · <span class="contact-number">072 030 1793</span>
        </div>
      </div>
    </div>
    <p class="change-note">Please contact Dipolelo or Thembi if you need to update or cancel your RSVP.</p>
  </div>
</div>
</body>
</html>
